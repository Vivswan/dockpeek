# DockPeek SwiftLint Configuration
# Tuned for existing codebase — strict enough to catch real issues,
# lenient enough to avoid hundreds of false positives on day one.

excluded:
  - DockPeek/Vendor
  - build
  - DerivedData

# --- Rule Customization ---

disabled_rules:
  - force_cast               # 10 intentional AX/CF casts, all safe
  - trailing_whitespace      # SwiftFormat handles this
  - opening_brace            # SwiftFormat handles this
  - todo                     # We use TODO comments intentionally
  - multiple_closures_with_trailing_closure  # Common SwiftUI pattern (Toggle, Picker, etc.)
  - closure_parameter_position  # SwiftFormat handles closure layout
  - for_where                # Filter-inside-for is sometimes clearer than where clause
  - statement_position       # SwiftFormat handles brace placement

opt_in_rules:
  - empty_count              # prefer .isEmpty over .count == 0
  - closure_spacing          # consistent spacing in closures
  - contains_over_filter_count
  - contains_over_first_not_nil
  - toggle_bool              # prefer .toggle() over x = !x
  - first_where              # prefer .first(where:) over .filter().first
  - last_where               # prefer .last(where:) over .filter().last
  - sorted_first_last        # prefer .min()/.max() over .sorted().first/.last
  - yoda_condition           # avoid "42 == x" style
  - redundant_type_annotation
  - unavailable_function     # mark unimplemented inits as unavailable
  - unowned_variable_capture # prefer weak over unowned

# --- Threshold Adjustments ---

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_interpolated_strings: true

function_body_length:
  warning: 100
  error: 200

type_body_length:
  warning: 500
  error: 1000

file_length:
  warning: 600
  error: 1200

cyclomatic_complexity:
  warning: 15
  error: 25

large_tuple:
  warning: 4

nesting:
  type_level: 2
  function_level: 3

identifier_name:
  min_length:
    warning: 1    # Allow single-char names (i, x, y, etc.) — common in CG/math code
  max_length:
    warning: 60
  excluded:
    - id
    - pH       # primary screen height (used extensively)
    - ww       # window width
    - wh       # window height
    - bd       # bounds dictionary
    - sz       # size
    - fn       # function reference
    - GetPSNForPID  # C-interop function, matches Apple API naming
    - _axGetWindow  # Private API wrapper, underscore prefix intentional

function_parameter_count:
  warning: 7
  error: 10

reporter: "xcode"
